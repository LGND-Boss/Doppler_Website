<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>Menu · Sunset Shift 2.0 · Doppler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { overflow-x: hidden; cursor: auto; }

  .menu-page {
    min-height: 100vh;
    background: var(--bone);
    color: var(--ink);
  }

  /* Topbar — minimal version for the menu page */
  .menu-top {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 48px;
    background: rgba(235, 227, 210, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
  }
  .menu-top a { color: inherit; text-decoration: none; }
  .menu-top .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .menu-top .brand-mark {
    width: 32px; height: 32px;
    background-image: url('img/logo.png');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }
  .menu-top .back {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.65;
    transition: opacity 0.2s;
  }
  .menu-top .back:hover { opacity: 1; }

  /* Masthead */
  .menu-mast {
    padding: 80px 48px 48px;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 48px;
    align-items: end;
  }
  .menu-mast .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 24px;
  }
  .menu-mast h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 9vw, 132px);
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  .menu-mast h1 .serif {
    display: block;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    text-transform: none;
    letter-spacing: -0.02em;
  }
  .menu-mast .meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.8;
    opacity: 0.7;
  }
  .menu-mast .meta .num {
    font-size: 48px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    text-transform: none;
    letter-spacing: -0.02em;
    opacity: 1;
    line-height: 1;
    margin-top: 8px;
    display: block;
  }

  /* Two-column body */
  .menu-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--rule);
  }
  .menu-col {
    padding: 48px;
  }
  .menu-col + .menu-col {
    border-left: 1px solid var(--rule);
  }

  /* Category header */
  .cat {
    margin-bottom: 32px;
  }
  .cat + .cat { margin-top: 56px; }
  .cat-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--ink);
    margin-bottom: 20px;
  }
  .cat-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .cat-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .cat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0.6;
    margin-bottom: 12px;
    margin-top: -8px;
  }

  /* Item rows */
  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: baseline;
    padding: 10px 0;
    position: relative;
  }
  .item + .item {
    border-top: 1px dashed rgba(26,20,16,0.14);
  }
  .item-name {
    font-size: 17px;
    letter-spacing: -0.005em;
    line-height: 1.35;
  }
  .item-note {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    opacity: 0.55;
    margin-top: 2px;
    text-transform: lowercase;
  }
  .item-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    color: var(--ink);
  }
  .item-price .cur {
    opacity: 0.5;
    margin-right: 2px;
  }

  .price-list {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-align: right;
    line-height: 1.6;
    color: rgba(26,20,16,0.78);
  }

  /* Category add-ons */
  .cat-addons {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed rgba(26,20,16,0.2);
  }
  .cat-addons-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 10px;
  }
  .addon-pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    margin: 0 6px 6px 0;
    border: 1px solid rgba(26,20,16,0.18);
    border-radius: 999px;
  }
  .addon-pill em { font-style: normal; opacity: 0.6; }

  /* Add-on / footer banner */
  .menu-banner {
    background: var(--ink);
    color: var(--bone);
    padding: 40px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
    border-bottom: 1px solid var(--rule-on-dark);
  }
  .menu-banner .label { color: rgba(235,227,210,0.55); }
  .menu-banner h4 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    margin-top: 8px;
    margin-bottom: 8px;
  }
  .menu-banner p {
    font-size: 14px;
    line-height: 1.5;
    opacity: 0.8;
  }
  .menu-banner .add-row {
    display: flex; flex-direction: column; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .menu-banner .add-row span {
    display: flex; justify-content: space-between;
    padding-bottom: 4px;
    border-bottom: 1px dashed rgba(244,201,122,0.2);
  }

  /* Foot */
  .menu-foot {
    padding: 32px 48px 48px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.6;
    flex-wrap: wrap;
    gap: 16px;
  }
  .menu-foot .serif {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 18px;
    text-transform: none;
    letter-spacing: 0;
    opacity: 1;
  }

  /* Mobile */
  @media (max-width: 880px) {
    .menu-top { padding: 14px 20px; }
    .menu-mast { padding: 56px 20px 32px; grid-template-columns: 1fr; gap: 24px; }
    .menu-mast .meta { text-align: left; }
    .menu-body { grid-template-columns: 1fr; }
    .menu-col { padding: 32px 20px; }
    .menu-col + .menu-col { border-left: none; border-top: 1px solid var(--rule); }
    .menu-banner { grid-template-columns: 1fr; padding: 32px 20px; }
    .menu-foot { padding: 24px 20px 32px; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<div class="menu-page">
  <header class="menu-top">
    <a href="index.html" class="brand">
      <span class="brand-mark"></span>
      <span>डॉप्लर · Doppler</span>
    </a>
    <a href="index.html" class="back">← Back to site</a>
  </header>

  <section class="menu-mast">
    <div>
      <div class="eyebrow" id="m-eyebrow"></div>
      <h1 id="m-title"></h1>
    </div>
    <div class="meta" id="m-meta"></div>
  </section>

  <section class="menu-body" id="m-body"></section>

  <section class="menu-banner" id="m-banner"></section>

  <footer class="menu-foot" id="m-foot"></footer>
</div>

<script>
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderCol(cats, groups) {
    return '<div class="menu-col">' + cats.map(cat => {
      const items = (cat.items || []).map(it => {
        const itemAddons = (it.addons || []).map(a => esc(a.name) + ' ₹' + a.price).join(' · ');
        return `
        <div class="item">
          <div>
            <div class="item-name">${esc(it.name)}</div>
            ${it.note ? '<span class="item-note">' + esc(it.note) + '</span>' : ''}
            ${itemAddons ? '<span class="item-note">+ ' + itemAddons + '</span>' : ''}
          </div>
          ${it.price != null ? '<div class="item-price"><span class="cur">₹</span>' + esc(it.price) + '</div>' : ''}
        </div>`;
      }).join('');
      // category-level add-ons (resolved from groups)
      const catAddons = (cat.addonGroups || []).flatMap(g => groups[g] || []);
      const addonBlock = catAddons.length ? `
        <div class="cat-addons">
          <div class="cat-addons-label">Add-ons</div>
          ${catAddons.map(a => '<span class="addon-pill">' + esc(a.name) + ' <em>₹' + a.price + '</em></span>').join('')}
        </div>` : '';
      const station = cat.station || 'bar';
      return `
        <div class="cat">
          <div class="cat-head">
            <div class="cat-title">${esc(cat.title)}</div>
            <div class="cat-code">§ ${esc(station)}</div>
          </div>
          ${items}
          ${addonBlock}
        </div>`;
    }).join('') + '</div>';
  }

  function renderMenu(m) {
    document.title = 'Menu · Doppler';
    document.getElementById('m-eyebrow').textContent = '§ Menu · ' + (m.edition || '');
    document.getElementById('m-title').innerHTML = 'The<br/>full<br/><span class="serif">menu.</span>';
    document.getElementById('m-meta').innerHTML =
      'Doppler · coffee<br/>C-Scheme · Jaipur<span class="num">06:00 — 22:30</span>';

    // Split categories by station: drinks (bar) on the left, food (kitchen) on the right.
    const cats = m.categories || [];
    const left  = cats.filter(c => (c.station || 'bar') !== 'kitchen');
    const right = cats.filter(c => (c.station || 'bar') === 'kitchen');
    const groups = m.addonGroups || {};
    document.getElementById('m-body').innerHTML = renderCol(left, groups) + renderCol(right, groups);

    document.getElementById('m-banner').innerHTML = `
      <div>
        <div class="label">§ The bar</div>
        <h4>Slow water, better coffee.</h4>
        <p>House-roasted beans, weekly. Matcha & hojicha ceremonial grade, dairy-free by default. Ask the bar which lot is on today.</p>
      </div>
      <div>
        <div class="label">§ The kitchen</div>
        <h4>From the brick oven.</h4>
        <p>All-day brekkie, snacks, pizzette, bowls and plates. Made to share — or not.</p>
      </div>
      <div>
        <div class="label">§ The fine print</div>
        <h4>One last thing.</h4>
        <p>All prices in ₹ and exclude applicable taxes unless stated. Veg, vegan, egg and allergen options available — just ask.</p>
      </div>`;

    document.getElementById('m-foot').innerHTML = `
      <span>© 2026 Doppler Coffee · ${esc(m.edition || '')}</span>
      <span class="serif">Slow water. Second cup is always.</span>
      <span>26.9130°N · 75.8060°E</span>`;
  }

  fetch('menu.json')
    .then(r => r.json())
    .then(renderMenu)
    .catch(() => { document.getElementById('m-body').innerHTML = '<div class="menu-col"><p>Menu failed to load.</p></div>'; });
</script>

</body>
</html>
